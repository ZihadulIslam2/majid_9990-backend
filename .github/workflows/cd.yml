name: CD Pipeline

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and Push Docker Image
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    concurrency: staging
    
    steps:
      - name: SSH to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /app/majid_backend
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f
      
      - name: Health Check
        run: |
          sleep 30
          curl -f http://${{ secrets.STAGING_HOST }}:5000/health || exit 1

  # Job 3: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    concurrency: production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Production Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /app/majid_backend
            # Backup current version
            mkdir -p /backups/$(date +%Y%m%d_%H%M%S)
            cp docker-compose.yml /backups/$(date +%Y%m%d_%H%M%S)/
            
            # Pull latest image
            docker-compose pull
            
            # Blue-Green Deployment
            docker-compose up -d --scale app=2 --no-recreate
            sleep 30
            
            # Health check
            if curl -f http://localhost:5000/health; then
              echo "Health check passed, proceeding with rollout"
              docker-compose up -d --scale app=1 --no-deps --force-recreate app
            else
              echo "Health check failed, rolling back"
              docker-compose down
              docker-compose up -d
              exit 1
            fi
            
            docker system prune -f
      
      - name: Notify Success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"text": "🚀 Deployment successful for ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }}
